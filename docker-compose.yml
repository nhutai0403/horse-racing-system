services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: horse-racing-db
    restart: always
    environment:
      SA_PASSWORD: "HorseRacing@123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S",
          "localhost",
          "-U",
          "sa",
          "-P",
          "HorseRacing@123",
          "-C",
          "-Q",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: horse-racing-db-init
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./database/init/HorseRacingDB.sql:/init.sql
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "HorseRacing@123" -C -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = N'horseracing') CREATE DATABASE [horseracing]"
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "HorseRacing@123" -C -d horseracing -i /init.sql

  backend:
    build: ./backend
    container_name: horse-racing-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 1433
      DB_NAME: horseracing
      DB_USER: sa
      DB_PASSWORD: "HorseRacing@123"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    container_name: horse-racing-frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - DOCKER_ENV=true
    depends_on:
      - backend

volumes:
  mssql-data:
