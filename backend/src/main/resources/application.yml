spring:
  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:HorseRacingDB};encrypt=true;trustServerCertificate=true
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:your-email@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

# ===== JWT Configuration =====
app:
  jwt:
    # Base64-encoded 256-bit secret key for HMAC-SHA256
    # IMPORTANT: Change this in production and use environment variables!
    secret: ${JWT_SECRET:dGhpc0lzQVZlcnlMb25nU2VjcmV0S2V5Rm9ySldUU2lnbmluZ1B1cnBvc2VzMTIzNDU2Nzg5MA==}
    access-token-expiration: 900000 # 15 minutes (in milliseconds)
    refresh-token-expiration: 604800000 # 7 days (in milliseconds)
  google:
    # Replace with your actual Google OAuth2 Client ID and Secret
    # Get these from: https://console.cloud.google.com/apis/credentials
    client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
  activation-url: ${APP_ACTIVATION_URL:http://localhost:5173/verify-email}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  gemini:
    api-key: ${GEMINI_API_KEY:your-gemini-api-key}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
