spring:
  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:HorseRacingDB};encrypt=true;trustServerCertificate=true;
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:HorseRacing@123}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

server:
  port: 8080

# ===== JWT Configuration =====
app:
  jwt:
    # Base64-encoded 256-bit secret key for HMAC-SHA256
    # IMPORTANT: Change this in production and use environment variables!
    secret: dGhpc0lzQVZlcnlMb25nU2VjcmV0S2V5Rm9ySldUU2lnbmluZ1B1cnBvc2VzMTIzNDU2Nzg5MA==
    access-token-expiration: 900000 # 15 minutes (in milliseconds)
    refresh-token-expiration: 604800000 # 7 days (in milliseconds)
  google:
    # Replace with your actual Google OAuth2 Client ID and Secret
    # Get these from: https://console.cloud.google.com/apis/credentials
    client-id: YOUR_GOOGLE_CLIENT_ID
    client-secret: YOUR_GOOGLE_CLIENT_SECRET
